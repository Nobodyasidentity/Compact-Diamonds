name: Sync Paper Plugin
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "pack.mcmeta"
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source datapack repo
        uses: actions/checkout@v4
      - name: Checkout paper plugin repo
        uses: actions/checkout@v4
        with:
          repository: Nobodyasidentity/Compact-Diamonds-Paper
          token: ${{secrets.REPO_TOKEN}}
          path: paper-plugin
      - name: Sync pack.mcmeta and data/
        run: |
          cp pack.mcmeta paper-plugin/datapackplugin/pack.mcmeta
          rm -rf paper-plugin/datapackplugin/data
          cp -r data paper-plugin/datapackplugin/data
      - name: Commit and push
        working-directory: paper-plugin
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datapackplugin/pack.mcmeta datapackplugin/data
          git diff --staged --quiet || git commit -m "chore: sync datapack files from source"
          git push
